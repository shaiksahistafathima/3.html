<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Tables Example</title>
</head>
<body>
    <h1>HTML Tables Example</h1>
     <table border="1">
        <tr>
            <th>Student Name</th>
            <th>Subject</th>
            <th>Marks</th>
        </tr>
        <tr>
            <td rowspan="2">Alice</td>
            <td>Math</td>
            <td>85</td>
        </tr>
        <tr>
            <td>Science</td>
            <td>90</td>
        </tr>
        <tr>
            <td>Bob</td>
            <td colspan="2">Absent</td>
        </tr>
    </table>
</body>
</html>
